name: Android Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Configure Node memory
        run: export NODE_OPTIONS=--max-old-space-size=4096
        shell: bash

      - name: Clear cache and reinstall
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Clear Metro cache
        run: rm -rf /tmp/metro-cache ~/.metro

      - name: Prebuild Android
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npx expo prebuild --platform android --clean --verbose

      - name: Validate signing secrets
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}"
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/release.jks

      - name: Build APK/AAB (Release)
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          cd android && ./gradlew assembleRelease bundleRelease

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp -v android/app/build/outputs/apk/release/*.apk dist/ 2>/dev/null || true
          cp -v android/app/build/outputs/bundle/release/*.aab dist/ 2>/dev/null || true
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*

